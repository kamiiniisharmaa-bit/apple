    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #ffffff;

            font-weight: 400;
            border-radius: 980px; /* Round Apple-style button */

            transition: background 0.2s;
        }

        .call-btn:hover {
            background-color: #0077ed;
        }

        .status-container {
            margin-top: 20px;
        }

        .availability {
            font-size: 12px;
            font-weight: 600;
            color: #86868b;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }

        .number {
            font-size: 32px;
            font-weight: 600;
            color: #1d1d1f;
            margin-bottom: 40px;
        }

        footer {
            margin-top: 60px;
            font-size: 12px;
            color: #86868b;
            padding-bottom: 40px;
